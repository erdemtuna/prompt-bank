name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Validate, test, and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run validate
      - run: npm run guard:private
      - run: npm test
      - run: npm run build

  rust-core:
    name: Rust core tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install the pinned Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Test the pure core crate (no webview libraries needed)
        working-directory: src-tauri
        run: cargo test -p prompt-bank-core --locked
