name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build installers (${{ matrix.name }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            name: macOS Apple Silicon
            slug: macos-arm64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            name: macOS Intel
            slug: macos-x64
          - platform: ubuntu-22.04
            args: ''
            name: Linux
            slug: linux
          - platform: windows-latest
            args: ''
            name: Windows
            slug: windows
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Set up the pinned Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.94.0'
          # macOS builds both architectures; the targets are unused elsewhere.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Install frontend dependencies
        run: npm ci

      - name: Build installers, and publish a draft release on a version tag
        id: tauri
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # On a v* tag push this creates/updates a draft GitHub release and
          # uploads the installers. On a manual run tagName is empty, so the
          # action only builds and the artifacts are uploaded in the next step.
          tagName: ${{ github.event_name == 'push' && github.ref_name || '' }}
          releaseName: ${{ github.event_name == 'push' && 'Prompt Bank __VERSION__' || '' }}
          releaseBody: ${{ github.event_name == 'push' && 'Unsigned builds. Download the installer for your operating system below. macOS Gatekeeper and Windows SmartScreen may warn on first open until code signing is added.' || '' }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload installers as artifacts (manual test builds)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: prompt-bank-${{ matrix.slug }}
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/*/release/bundle/**
          if-no-files-found: ignore
          retention-days: 7
